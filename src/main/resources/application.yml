spring:
  application:
    name: java-serverless-funds-orchestrator
  async:
    executor:
      core-pool-size: 5
      max-pool-size: 20
      queue-capacity: 100

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: BTG Pactual Investment Fund Orchestrator
    version: 1.0.0

# ── AWS / DynamoDB ────────────────────────────────────────────────────────────
aws:
  dynamodb:
    endpoint: ${DYNAMODB_ENDPOINT:}
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:local}
    secret-key: ${AWS_SECRET_ACCESS_KEY:local}
    table-name: ${DYNAMODB_TABLE_NAME:FondosBTG}

# ── SpringDoc / Swagger ───────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs

# ── Logging (structured JSON for CloudWatch) ──────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
