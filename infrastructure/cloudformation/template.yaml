AWSTemplateFormatVersion: "2010-09-09"
Description: >
  BTG Pactual - Investment Fund Orchestrator.
  Free Tier: VPC, Subnets, Security Group, DynamoDB, EC2 t3.micro, IAM (Least Privilege)
  Compute: EC2 t3.micro (750 hours/month FREE on new accounts) running Docker + Spring Boot.
  Database: DynamoDB PAY_PER_REQUEST (25GB + 200M requests FREE).

# ==============================================================================
# PARAMETERS
# ==============================================================================
Parameters:

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  AppPort:
    Type: Number
    Default: 8080
    Description: Port the Spring Boot application listens on

  DynamoDbTableName:
    Type: String
    Default: FondosBTG
    Description: DynamoDB single table name

  ImageUri:
    Type: String
    Description: >
      ECR image URI for the application.
      Example: 123456789.dkr.ecr.us-east-1.amazonaws.com/btg-funds-orchestrator:latest

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"

  PublicSubnet1Cidr:
    Type: String
    Default: "10.0.1.0/24"

  AmiId:
    Type: String
    Description: >
      Amazon Linux 2023 AMI ID (free tier eligible). Get it with:
      aws ec2 describe-images --owners amazon
      --filters "Name=name,Values=al2023-ami-*-x86_64" "Name=state,Values=available"
      --query "sort_by(Images, &CreationDate)[-1].ImageId" --output text --region us-east-1


# ==============================================================================
# RESOURCES
# ==============================================================================
Resources:

  # --- VPC -------------------------------------------------------------------
  BtgVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "btg-funds-vpc-${Environment}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "btg-funds-igw-${Environment}"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref BtgVpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref BtgVpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "btg-public-subnet-1-${Environment}"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BtgVpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  # --- Security Group --------------------------------------------------------
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: BTG Funds - allow app port and SSH
      VpcId: !Ref BtgVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref AppPort
          ToPort: !Ref AppPort
          CidrIp: "0.0.0.0/0"
          Description: Spring Boot application port
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: "0.0.0.0/0"
          Description: SSH access for troubleshooting
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: Allow all outbound (ECR pull + DynamoDB calls)
      Tags:
        - Key: Name
          Value: !Sub "btg-funds-sg-${Environment}"

  # --- DynamoDB Table (Single Table Design) ----------------------------------
  FondosBTGTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref DynamoDbTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: btg-funds-orchestrator
        - Key: Environment
          Value: !Ref Environment

  # --- IAM Role for EC2 - Least Privilege ------------------------------------
  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "btg-funds-ec2-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDbLeastPrivilege
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DynamoDbTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:TransactWriteItems
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt FondosBTGTable.Arn
        - PolicyName: EcrReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EcrPullImage
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: "*"
      # AmazonSSMManagedInstanceCore enables Session Manager (browser SSH)
      # so you can connect to the instance without a key pair
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "btg-funds-ec2-profile-${Environment}"
      Roles:
        - !Ref Ec2InstanceRole

  # --- EC2 t2.micro (FREE TIER) ----------------------------------------------
  BtgFundsEc2Instance:
    Type: AWS::EC2::Instance
    DependsOn: FondosBTGTable
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "btg-funds-server-${Environment}"
        - Key: Project
          Value: btg-funds-orchestrator
      UserData:
        Fn::Base64:
          !Sub
          - |
            #!/bin/bash
            set -e
            
            # Capture resolved values into shell variables first
            APP_PORT="${AppPort}"
            IMAGE_URI="${ImageUri}"
            AWS_REGION_VAL="${AWS::Region}"
            TABLE_NAME="${DynamoDbTableName}"
            ENV_NAME="${Environment}"
            ECR_HOST=$(echo "$IMAGE_URI" | cut -d'/' -f1)
            
            # Log all values for troubleshooting
            echo "=== BTG Startup ===" >> /var/log/btg-startup.log
            echo "IMAGE_URI=$IMAGE_URI" >> /var/log/btg-startup.log
            echo "AWS_REGION=$AWS_REGION_VAL" >> /var/log/btg-startup.log
            echo "TABLE_NAME=$TABLE_NAME" >> /var/log/btg-startup.log
            echo "ECR_HOST=$ECR_HOST" >> /var/log/btg-startup.log
            
            # Install and start Docker
            yum update -y
            yum install -y docker
            systemctl enable docker
            systemctl start docker
            
            # Authenticate with ECR
            aws ecr get-login-password --region "$AWS_REGION_VAL" | \
              docker login --username AWS --password-stdin "$ECR_HOST"
            
            # Pull image
            docker pull "$IMAGE_URI"
            
            # Run container with explicit environment variables
            docker run -d \
              --name btg-funds-app \
              --restart unless-stopped \
              -p "$APP_PORT":8080 \
              -e SPRING_PROFILES_ACTIVE="$ENV_NAME" \
              -e AWS_REGION="$AWS_REGION_VAL" \
              -e AWS_DEFAULT_REGION="$AWS_REGION_VAL" \
              -e DYNAMODB_TABLE_NAME="$TABLE_NAME" \
              -e DYNAMODB_ENDPOINT="" \
              "$IMAGE_URI"
            
            echo "Container started successfully" >> /var/log/btg-startup.log
          - {}


# ==============================================================================
# OUTPUTS
# ==============================================================================
Outputs:

  AppUrl:
    Description: Application URL
    Value: !Sub "http://${BtgFundsEc2Instance.PublicIp}:${AppPort}"
    Export:
      Name: !Sub "BtgFundsUrl-${Environment}"

  SwaggerUiUrl:
    Description: Swagger UI URL
    Value: !Sub "http://${BtgFundsEc2Instance.PublicIp}:${AppPort}/swagger-ui.html"

  HealthCheckUrl:
    Description: Health check endpoint
    Value: !Sub "http://${BtgFundsEc2Instance.PublicIp}:${AppPort}/actuator/health"

  AppPublicIp:
    Description: Public IP of the EC2 instance
    Value: !GetAtt BtgFundsEc2Instance.PublicIp

  DynamoDbTableName:
    Description: DynamoDB table name
    Value: !Ref FondosBTGTable

  DynamoDbTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt FondosBTGTable.Arn

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref BtgFundsEc2Instance
